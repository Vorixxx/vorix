<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>المفضلة | VORIX</title>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <link rel="stylesheet" href="css/theme.css">
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/components.css">
    <link rel="stylesheet" href="css/animations.css">
    <link rel="stylesheet" href="css/responsive.css">
    
    <style>
        .page-header {
            background-color: var(--secondary-bg);
            padding: 100px 20px 60px;
            text-align: center;
            margin-bottom: 40px;
        }

        .grid-4 { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 30px; }
        
        .empty-state {
            text-align: center;
            padding: 80px 20px;
        }
    </style>
</head>
<body>

    <!-- Header -->
    <header class="header">
        <div class="header-container">
            <div class="header-left" style="justify-content: flex-start;">
                <a href="shop.html" class="icon-btn" aria-label="بحث"><i class="fa-solid fa-magnifying-glass"></i></a>
                <a href="shop.html" class="lang-toggle" style="margin: 0 10px;">المتجر</a>
            </div>
            
            <a href="index.html" class="logo">VORIX</a>

            <div class="header-right" style="justify-content: flex-end;">
                <a href="wishlist.html" class="icon-btn" style="color: var(--accent-color);"><i class="fa-solid fa-heart"></i></a>
                <a href="cart.html" class="icon-btn" aria-label="السلة">
                    <i class="fa-solid fa-bag-shopping"></i>
                    <span class="cart-count" style="display: none;">0</span>
                </a>
            </div>
        </div>
    </header>

    <div class="page-header animate-fade-in">
        <div class="container">
            <h1 class="section-title">المفضلة</h1>
            <p class="section-subtitle">المنتجات التي قمت بحفظها لشرائها لاحقاً.</p>
        </div>
    </div>

    <main class="container" style="min-height: 50vh;">
        <div class="empty-state">
            <i class="fa-regular fa-heart" style="font-size: 4rem; color: var(--border-color); margin-bottom: 20px;"></i>
            <h2 style="font-size: 1.5rem; margin-bottom: 15px;">لا توجد منتجات في المفضلة</h2>
            <p style="color: var(--secondary-text); margin-bottom: 30px;">تصفح منتجاتنا واضغط على علامة القلب لحفظ المنتجات التي تعجبك.</p>
            <a href="shop.html" class="btn btn-primary">تصفح المنتجات</a>
        </div>
    </main>

    <!-- Footer -->
    <footer class="footer" style="background-color: var(--secondary-bg); padding: 60px 20px 30px; border-top: 1px solid var(--border-color); margin-top: 100px;">
        <div class="container">
            <div style="display: flex; flex-direction: column; align-items: center; text-align: center;">
                <h3 class="logo" style="margin-bottom: 20px; font-size: 2rem;">VORIX</h3>
                <div class="footer-bottom" style="width: 100%; border-top: 1px solid var(--border-color); padding-top: 20px; margin-top: 0; font-weight: 600;">
                    &copy; 2026 VORIX. جميع الحقوق محفوظة.
                </div>
            </div>
        </div>
    </footer>

    <!-- Scripts -->
    <script src="js/data.js"></script>
    <script src="js/theme.js"></script>
    <script src="js/animations.js"></script>
    <script src="js/main.js"></script>
</body>
</html>
